
<canvas id="cvs" width="680" height="360" style="width:100%;border-radius:20px;display:block;background:#000008"></canvas>
<script>
const cv=document.getElementById('cvs'),ctx=cv.getContext('2d');
const W=680,H=360,MY=H/2,PR=24;

const SCOLS=['#00aaff','#00ccff','#00eeff','#cc00ff','#ff00cc','#ee00dd','#ff8800','#ffaa00','#0088ff','#ff55cc'];
const streaks=Array.from({length:38},()=>({
  x:Math.random()*W,y:Math.random()*H,
  len:45+Math.random()*150,spd:0.5+Math.random()*2,
  col:SCOLS[Math.floor(Math.random()*SCOLS.length)],
  al:0.08+Math.random()*0.48,w:0.4+Math.random()*3,
}));

const ambDiamonds=Array.from({length:18},()=>({
  x:Math.random()*W,y:Math.random()*H,sz:1.5+Math.random()*4,
  col:['#ff00cc','#00ccff','#ff8800','#cc00ff'][Math.floor(Math.random()*4)],
  ph:Math.random()*Math.PI*2,spd:0.2+Math.random()*0.5,
}));

const pellets=[];
for(let x=55;x<W+55;x+=34) pellets.push({x,on:true});

const pwr=[{x:155,y:MY,ox:155},{x:455,y:MY,ox:455}];
const GCOLS=['#ff00cc','#bb00ff','#ff44dd','#8800ff'];
const ghosts=GCOLS.map((c,i)=>({c,off:(i+1)*66,ph:Math.random()*Math.PI*2}));
const parts=[];

function spawnParts(x,y,col,n=12){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,v=1.2+Math.random()*4;
    parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-1,life:1,col,sz:1+Math.random()*3.5,dia:Math.random()>.45});
  }
}

let T=0,pacX=-PR*2;

function glo(col,blur){ctx.shadowColor=col;ctx.shadowBlur=blur;}

function drawBG(){
  ctx.fillStyle='#000008';ctx.fillRect(0,0,W,H);
  const ang=-Math.PI*.42;
  const cdx=Math.cos(ang),cdy=Math.sin(ang);
  streaks.forEach(s=>{
    ctx.save();ctx.globalAlpha=s.al;
    glo(s.col,14);ctx.strokeStyle=s.col;ctx.lineWidth=s.w;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x+cdx*s.len,s.y+cdy*s.len);ctx.stroke();
    ctx.restore();
    s.x+=s.spd*.8;s.y-=s.spd*.8;
    if(s.x>W+200||s.y<-200){s.x=Math.random()*W*.5-80;s.y=H+Math.random()*H*.4;s.al=0.08+Math.random()*0.48;}
  });
  ambDiamonds.forEach(d=>{
    const pulse=0.4+0.6*Math.abs(Math.sin(T*1.8+d.ph));
    ctx.save();ctx.globalAlpha=pulse*.7;
    ctx.translate(d.x,d.y);ctx.rotate(T*d.spd);
    glo(d.col,14);ctx.fillStyle=d.col;
    ctx.beginPath();ctx.moveTo(0,-d.sz);ctx.lineTo(d.sz*.55,0);ctx.lineTo(0,d.sz);ctx.lineTo(-d.sz*.55,0);ctx.closePath();ctx.fill();
    ctx.restore();
    d.x+=.25;d.y-=.12;
    if(d.x>W+20||d.y<-20){d.x=-8;d.y=Math.random()*H;}
  });
}

function drawPac(x){
  const ma=Math.abs(Math.sin(T*9.5))*.37+.04;
  ctx.save();
  // motion trail
  const tg=ctx.createLinearGradient(x-80,MY,x,MY);
  tg.addColorStop(0,'rgba(0,180,255,0)');tg.addColorStop(1,'rgba(0,200,255,0.07)');
  ctx.fillStyle=tg;ctx.fillRect(x-80,MY-PR,80,PR*2);
  // bloom
  [45,30,18].forEach((b,i)=>{
    ctx.globalAlpha=0.04+i*.01;glo('#00ffff',0);ctx.fillStyle='#00aaff';
    ctx.beginPath();ctx.moveTo(x,MY);ctx.arc(x,MY,PR+b*.5,ma,Math.PI*2-ma);ctx.closePath();ctx.fill();
  });
  ctx.globalAlpha=1;
  // body
  const bg=ctx.createRadialGradient(x-PR*.32,MY-PR*.32,1,x,MY,PR);
  bg.addColorStop(0,'#ffffff');bg.addColorStop(0.28,'#ccf0ff');bg.addColorStop(0.65,'#22aadd');bg.addColorStop(1,'#004466');
  glo('#00ddff',40);ctx.fillStyle=bg;
  ctx.beginPath();ctx.moveTo(x,MY);ctx.arc(x,MY,PR,ma,Math.PI*2-ma);ctx.closePath();ctx.fill();
  // rim
  glo('#00ffff',22);ctx.strokeStyle='rgba(0,255,255,0.85)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(x,MY);ctx.arc(x,MY,PR,ma,Math.PI*2-ma);ctx.closePath();ctx.stroke();
  // specular
  ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,0.48)';
  ctx.beginPath();ctx.arc(x-PR*.3,MY-PR*.32,PR*.26,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawGhost(g){
  const gx=pacX-g.off;
  if(gx<-70||gx>W+70) return;
  const gy=MY+Math.sin(T*2.4+g.ph)*7;
  const GW=16,GH=22;
  ctx.save();
  glo(g.c,30);ctx.fillStyle=g.c;ctx.globalAlpha=.87;
  ctx.beginPath();
  ctx.arc(gx,gy,GW,Math.PI,0,true); // dome top
  ctx.lineTo(gx+GW,gy+GH); // right side
  const segs=4;
  for(let i=0;i<=segs;i++)
    ctx.lineTo(gx+GW-(i/segs)*GW*2, gy+GH-(i%2===0?0:9));
  ctx.closePath();ctx.fill();
  // glow edge
  glo(g.c,20);ctx.strokeStyle=g.c;ctx.lineWidth=1.5;ctx.globalAlpha=.5;
  ctx.beginPath();ctx.arc(gx,gy,GW,Math.PI,0,true);ctx.lineTo(gx+GW,gy+GH);ctx.stroke();
  // eyes
  ctx.shadowBlur=0;ctx.globalAlpha=1;
  ctx.fillStyle='white';
  ctx.beginPath();ctx.ellipse(gx-7,gy-4,4.5,6,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(gx+7,gy-4,4.5,6,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1133ff';
  ctx.beginPath();ctx.arc(gx-6,gy-3,2.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(gx+8,gy-3,2.5,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawPellets(){
  pellets.forEach(p=>{
    if(!p.on) return;
    if(Math.abs(p.x-pacX)<PR+3){p.on=false;spawnParts(p.x,MY,'#00eeff',7);return;}
    ctx.save();
    glo('#00ffff',18);ctx.fillStyle='#00eeff';
    ctx.beginPath();ctx.arc(p.x,MY,3.5,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,0.65)';
    ctx.beginPath();ctx.arc(p.x,MY,1.2,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
}

function drawPwr(){
  pwr.forEach((p,pi)=>{
    if(p.x<-100) return;
    if(Math.abs(p.x-pacX)<PR+12){spawnParts(p.x,p.y,'#ff00cc',20);p.x=-999;return;}
    const sz=11+Math.sin(T*4+pi*1.5)*2.5;
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(T*1.4+pi);
    [18,10,0].forEach((b,bi)=>{
      ctx.globalAlpha=bi===2?1:0.07;
      glo(bi===2?'#ff00cc':'none',bi===2?35:0);
      ctx.fillStyle='#ff00dd';
      const s=sz+b*.5;
      ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s*.6,0);ctx.lineTo(0,s);ctx.lineTo(-s*.6,0);ctx.closePath();ctx.fill();
    });
    ctx.globalAlpha=1;ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,-sz);ctx.lineTo(sz*.6,0);ctx.lineTo(0,sz);ctx.lineTo(-sz*.6,0);ctx.closePath();ctx.stroke();
    ctx.restore();
  });
}

function drawParts(){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.07;p.vx*=0.97;p.life-=0.02;
    if(p.life<=0){parts.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=p.life;glo(p.col,10);ctx.fillStyle=p.col;
    if(p.dia){
      const s=p.sz*p.life;
      ctx.translate(p.x,p.y);ctx.rotate(T*4);
      ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s*.6,0);ctx.lineTo(0,s);ctx.lineTo(-s*.6,0);ctx.closePath();ctx.fill();
    } else {
      ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
}

function loop(){
  T+=0.016;pacX+=1.9;
  if(pacX>W+PR*3){
    pacX=-PR*2;
    pellets.forEach(p=>p.on=true);
    pwr.forEach(p=>p.x=p.ox);
  }
  drawBG();drawPellets();drawPwr();drawParts();
  drawPac(pacX);ghosts.forEach(drawGhost);
  requestAnimationFrame(loop);
}
loop();
</script>
