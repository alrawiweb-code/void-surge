<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VOID SURGE</title>
    <link rel="icon" type="image/png" href="favicon.png" sizes="32x32">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#000000">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <canvas id="c"></canvas>

    <div id="hud">
        <div class="sw"><span class="lbl">SCORE</span><span id="score-val">0</span></div>
        <div class="sw" style="align-items:flex-end"><span class="lbl">BEST</span><span id="best-val">0</span></div>
    </div>
    <div id="wave-lbl">LEVEL 1 / 100</div>
    <div id="combo">✦ x2 COMBO ✦</div>
    <div id="pbar">
        <div class="pu-wrap">
            <div class="pu-timer" id="pt-shield"></div>
            <div class="pu" id="pu-shield">🛡</div>
        </div>
        <div class="pu-wrap">
            <div class="pu-timer" id="pt-slow"></div>
            <div class="pu" id="pu-slow">⏳</div>
        </div>
        <div class="pu-wrap">
            <div class="pu-timer" id="pt-magnet"></div>
            <div class="pu" id="pu-magnet">💎</div>
        </div>
    </div>
    <div id="ldots">
        <div class="ldot" id="ld0"></div>
        <div class="ldot" id="ld1"></div>
        <div class="ldot" id="ld2"></div>
    </div>
    <button id="btn-pause">❚❚</button>

    <div class="screen" id="scr-login">
        <div class="gtitle" style="font-size: clamp(40px,10vw,80px);">IDENTIFY</div>
        <div class="sub" style="margin-top: 10px; margin-bottom: 25px;"></div>
        <input type="text" id="input-name" placeholder="CODENAME" autocomplete="off" maxlength="15">
        <button class="btn" id="btn-login-submit">ENTER VOID</button>
    </div>

    <div class="screen" id="scr-start">
        <div id="btn-settings" title="Settings">⚙️</div>
        <div class="gtitle">VOID<br>SURGE</div>
        <div class="sub"></div>
        <div class="sub" id="welcome-msg" style="color:#00f2ff; font-size:12px; margin-top:-20px;">WELCOME, PLAYER</div>
        <button class="btn" id="btn-start">SURGE IN</button>
        <div class="howto" style="font-size: 14px; color: #fff; text-shadow: 0 0 10px #00f2ff; letter-spacing: 2px;">
            REACH 100 LEVELS TO GET PRIZE.
        </div>
    </div>

    <div class="screen" id="scr-settings">
        <div class="go-title" style="color:#ffcc00;text-shadow:0 0 40px rgba(255,204,0,.55);">SYSTEM</div>
        <div
            style="font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(255,255,255,.28);margin:16px 0 32px;letter-spacing:3px;">
        </div>
        <div
            style="margin-bottom: 20px; font-family:'Share Tech Mono', monospace; font-size:14px; letter-spacing: 2px;">
            ACTIVE: <span id="set-name-display" style="color:#00f2ff;"></span></div>
        <div
            style="margin-bottom: 20px; font-family:'Share Tech Mono', monospace; font-size:14px; letter-spacing: 2px;">
            HIGHEST SCORE: <span id="set-highscore-display" style="color:#ffcc00;">0</span></div>
        <button class="btn sec" id="btn-change-name" style="margin: 0 4px 15px;">CHANGE NAME</button>
        <button class="btn sec" id="btn-clear-data"
            style="margin: 0 4px 15px; color:#ff3366; border-color:rgba(255,51,102,.3);">CLEAR SAVED DATA</button>
        <button class="btn sec" id="btn-toggle-mute" style="margin: 0 4px 15px; border-color:rgba(255,255,255,.3);">MUTE AUDIO</button>
        <button class="btn sec" id="btn-about-us" style="margin: 0 4px 15px;">ABOUT US</button>
        <button class="btn sec" id="btn-privacy-policy" style="margin: 0 4px 15px;">PRIVACY POLICY</button>
        <br>
        <button class="btn-small" id="btn-close-settings">BACK TO TERMINAL</button>
    </div>

    <div class="screen" id="scr-over">
        <div class="go-title">OBLITERATED</div>
        <div class="final-big" id="final-score">0</div>
        <div class="final-sub" id="final-sub">—</div>
        <div class="btn-row">
            <button class="btn" id="btn-restart">SURGE AGAIN</button>
        </div>
    </div>

    <!-- Victory Screen -->
    <div class="screen" id="scr-victory">
        <div class="go-title">VOID CONQUERED</div>
        <div class="final-big" id="final-score-win">0</div>
        <div class="final-sub" id="final-sub-win">—</div>
        <div class="btn-row">
            <button class="btn" id="btn-restart-win">PLAY AGAIN</button>
        </div>
    </div>

    <div class="screen" id="scr-pause">
        <div class="go-title" style="color:#00f2ff;text-shadow:0 0 40px rgba(0,242,255,.55);">PAUSED</div>
        <div
            style="font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(255,255,255,.28);margin:16px 0 32px;letter-spacing:3px;">
        </div>
        <div class="btn-row">
            <button class="btn" id="btn-resume">RESUME</button>
            <button class="btn sec" id="btn-quit">QUIT</button>
        </div>
    </div>

    <div id="boss-alert">⚠ BOSS INCOMING ⚠<br><span style="font-size:.55em;letter-spacing:.05em;" id="boss-sub">DEFEAT
            TO ADVANCE</span></div>
    <div id="chaos-alert">⚡ LEVEL UP ⚡</div>
    <div id="flash"></div>

    <script src="index.js"></script>
</body>

</html>
